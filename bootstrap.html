<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Práctica Bootstrap</title>
  <!-- Bootstrap CSS desde el CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <a href="index.html" class="btn btn-sm btn-outline-secondary mb-3">← Volver</a>

    <h1 class="text-primary">Hola con Bootstrap</h1>
    <p class="lead">Instituto Tecnológico Superior De Martínez De La Torre</p>
    <p>Alumno: <strong>José Fernando Hernández Galindo</strong></p>

    <button class="btn btn-success" onclick="saludar()">Botón verde</button>
    <button class="btn btn-danger" onclick="limpiar()">Botón rojo</button>

    <div id="mensaje" class="alert alert-info mt-3">
      Presiona un botón para ver qué pasa.
    </div>
  </div>

  <script>
    function saludar() {
      document.getElementById("mensaje").innerHTML =
        "✅ ¡Hola José Fernando! Botón verde presionado.";
      document.getElementById("mensaje").className = "alert alert-success mt-3";
    }

    function limpiar() {
      document.getElementById("mensaje").innerHTML =
        "❌ Botón rojo presionado, mensaje borrado.";
      document.getElementById("mensaje").className = "alert alert-danger mt-3";
    }
  </script>

</body>
</html>
